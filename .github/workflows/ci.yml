name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    name: Format (stylua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  test:
    name: Test (Neovim ${{ matrix.nvim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}
      - name: Run tests
        run: nvim -l tests/run.lua

  terminals:
    name: Terminal themes up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Regenerate terminal themes
        run: nvim -l scripts/gen-terminals.lua
      - name: Fail if extras/ is out of date
        run: |
          if ! git diff --exit-code -- extras/; then
            echo "::error::extras/ is stale. Run 'nvim -l scripts/gen-terminals.lua' and commit the result."
            exit 1
          fi
